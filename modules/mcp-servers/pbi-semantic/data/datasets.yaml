# UBI Power BI Dataset Inventory
# Each entry maps a business stream to its PBI semantic model.
# dataset IDs should be filled in from PBI REST API discovery or manual lookup.

datasets:
  - name: SO Backlog
    id: ""  # TODO: discover via scripts/discover_datasets.py
    description: "Sales Order Backlog — open orders, bookings, shipments, holds, scheduling. Core operational dataset with 52 Gold views."
    workspace: prod
    stream: so_backlog
    refresh_schedule: "bi-hourly"
    owner: "UBI Data Team"

